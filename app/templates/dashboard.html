// ===== AUDIO ALERT SYSTEM =====
const audioContext = new (window.AudioContext || window.webkitAudioContext)();

function playBuzzerAlert() {
 const now = audioContext.currentTime;
 const osc = audioContext.createOscillator();
 const gain = audioContext.createGain();
 
 osc.connect(gain);
 gain.connect(audioContext.destination);
 
 osc.frequency.value = 800;
 osc.type = 'sine';
 
 gain.gain.setValueAtTime(0.3, now);
 gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
 
 osc.start(now);
 osc.stop(now + 0.5);
}

function playHighRiskAlert() {
 // Double beep for high risk
 for (let i = 0; i < 2; i++) {
  setTimeout(() => playBuzzerAlert(), i * 200);
 }
}

// ===== REAL-TIME UPDATE SYSTEM =====
let updateInterval = null;
let lastAlertStatus = {};

async function fetchLivePatientData(patientId) {
 try {
  const response = await fetch(`/api/patient/${patientId}`);
  if (!response.ok) return null;
  return await response.json();
 } catch (e) {
  console.error('Fetch error:', e);
  return null;
 }
}

function startRealTimeUpdates() {
 if (updateInterval) clearInterval(updateInterval);

 updateInterval = setInterval(async () => {
  // Don't re-render if a form is open (admit or discharge or HITL modal)
  if (showAdmit || showDischarge || showHitl) return;

  // Fetch updated patient data
  const updated = await fetchLivePatientData(selectedId);
  if (!updated) return;

  // Update local patient object
  const localPatient = patients.find(p => p.id === selectedId);
  if (localPatient) {
   const oldRisk = localPatient.sepsisRisk;

   // Deep update to ensure all nested objects update
   Object.assign(localPatient, updated);

   // Check for risk level change AFTER updating
   if (updated.sepsisRisk >= 0.75) {
    if (!lastAlertStatus[selectedId]) {
     lastAlertStatus[selectedId] = true;
     playHighRiskAlert();
    }
   } else {
    lastAlertStatus[selectedId] = false;
   }
  }

  // Force dashboard render with updated data
  renderSidebar();
  renderMain();
 }, 2000); // Update every 2 seconds for faster refresh
}

function stopRealTimeUpdates() {
 if (updateInterval) {
  clearInterval(updateInterval);
  updateInterval = null;
 }
}

function riskColor(r){
 if(r>=0.75) return "#E24B4A";
 if(r>=0.4) return "#EF9F27";
 return "#639922";
}
function riskTextClass(r){
 if(r>=0.75) return "danger";
 if(r>=0.4) return "warning";
 return "ok";
}
function badgeClass(r){
 if(r>=0.75) return "badge-danger";
 if(r>=0.4) return "badge-warning";
 return "badge-ok";
}
function riskLabel(r){
 if(r>=0.75) return "High Risk";
 if(r>=0.4) return "Moderate";
 return "Low Risk";
}

function sendSMS(patient){
 const t = new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
 const msg = `[${t}] ALERT — ${patient.name} (${patient.ward}): Sepsis risk ${Math.round(patient.sepsisRisk*100)}%. Doctor: ${patient.doctor} notified.`;
 smsLog.unshift({time:t,msg,doctor:patient.doctor,phone:patient.doctorPhone,patient:patient.name});
 
 // Send actual SMS via backend API
 fetch(`/api/patient/${patient.id}/alert`, {method:'POST'})
  .then(r=>r.json())
  .then(data=>{
   if(data.success) {
    console.log(`✓ SMS sent to ${patient.doctor} (${patient.doctorPhone})`);
   }
  })
  .catch(e=>console.error('SMS error:', e));
}

function autoAlert(){
 patients.forEach(p=>{
  if(p.sepsisRisk>=0.75 && p.status==='admitted' && !alertsSent[p.id]){
   alertsSent[p.id] = true;
   sendSMS(p);
  }
 });
}

   <span class="badge ${badgeClass(p.sepsisRisk)}">${riskLabel(p.sepsisRisk)}</span>

 `).join('')||'<div style="padding:12px;font-size:12px;color:var(--color-text-secondary)">No admitted patients</div>';

 return Array.from({length:8},(_,i)=>{

 });
}

 });
}

function vClass(key,val){
 const danger={HR:[v=>v>130||v<40],Temp:[v=>v>38.5||v<36],MAP:[v=>v<65],O2Sat:[v=>v<92],Resp:[v=>v>25],WBC:[v=>v>15]};
 const warn={HR:[v=>v>100||v<55],Temp:[v=>v>37.8],MAP:[v=>v<70],O2Sat:[v=>v<95],Resp:[v=>v>20],WBC:[v=>v>12]};
 if(danger[key]&&danger[key][0](val)) return 'abn';
 if(warn[key]&&warn[key][0](val)) return 'warn';
 return '';
}

function featBarColor(d){
 if(d==='high') return '#E24B4A';
 if(d==='low') return '#378ADD';
 return '#EF9F27';
}

function renderMain(){
 const mc = document.getElementById('main-content');
 if(!mc) return;
 const admitted = patients.filter(p=>p.status==='admitted');
 if(!admitted.length){
  mc.innerHTML=`<div class="empty-state"><div style="font-size:32px;margin-bottom:12px">🏥</div><div style="font-size:15px;font-weight:500;margin-bottom:6px">No admitted patients</div><div>Use "+ Admit Patient" to add a new patient.</div></div>`;
  return;
 }
 const p = patients.find(x=>x.id===selectedId&&x.status==='admitted') || admitted[0];
 if(!p){mc.innerHTML='';return;}
 selectedId=p.id;

 const rPct = Math.round(p.sepsisRisk*100);
 const rCol = riskColor(p.sepsisRisk);
 const rTc = riskTextClass(p.sepsisRisk);

 const alertsHTML = p.alerts.length ? p.alerts.map(a=>`
  <div class="alert-box">
   <div class="alert-icon"></div>
   <div>
    <div class="alert-title">Sepsis Alert — ${a.time}</div>
    <div class="alert-msg">${a.msg}</div>
    ${alertsSent[p.id]?`<div class="sms-sent">SMS sent to ${p.doctor} (${p.doctorPhone})</div>`:''}
   </div>
  </div>
 `).join('') : `<div style="font-size:12px;color:var(--color-text-secondary);padding:4px 0">No active alerts</div>`;

 const featHTML = p.topFeatures.map(f=>`
  <div class="feat-row">
   <div class="feat-name">${f.name}</div>
   <div class="feat-bar-wrap"><div class="feat-bar" style="width:${Math.round(f.contrib*100)}%;background:${featBarColor(f.dir)}"></div></div>
   <div class="feat-val" style="color:${featBarColor(f.dir)}">${f.val} <span style="font-size:9px;color:var(--color-text-tertiary)">(${f.dir})</span></div>
  </div>
 `).join('');

 const tabs = ['HR','Temp','MAP','WBC'];
 const tabsHTML = tabs.map(t=>`<div class="tab ${chartTab===t?'active':''}" onclick="setChartTab('${t}',${p.id})">${t}</div>`).join('');

 const smsHTML = smsLog.length ? smsLog.slice(0,4).map(s=>`
  <div class="sms-entry"><b style="color:var(--color-text-primary)">${s.time}</b> — ${s.patient}: ${s.doctor} alerted via ${s.phone}</div>
 `).join('') : '<div style="font-size:11px;color:var(--color-text-secondary)">No messages sent yet.</div>';

 mc.innerHTML = `
  <div style="position:relative">
  ${showDischarge?`<div class="discharge-modal"><div class="modal-box">
   <div class="modal-title">Discharge Patient</div>
   <div class="modal-msg">Are you sure you want to discharge <b>${p.name}</b>? This will remove them from the active patient list.</div>
   <div class="modal-btns">
    <button class="btn btn-gray" onclick="cancelDischarge()">Cancel</button>
    <button class="btn btn-red" onclick="confirmDischarge(${p.id})">Discharge</button>
   </div>
  </div></div>`:''}
  ${showAdmit?`<div class="admit-form"><div class="form-box">
   <div class="modal-title">Admit New Patient</div>
   <label>Patient Name</label><input id="f-name" placeholder="Full name">
   <label>Age</label><input id="f-age" type="number" placeholder="Age">
   <label>Gender</label><select id="f-gender"><option>M</option><option>F</option></select>
   <label>Ward</label><input id="f-ward" placeholder="e.g. ICU-A3">
   <label>Doctor In-Charge</label><input id="f-doc" placeholder="Doctor name">
   <label>Doctor Phone</label><input id="f-phone" placeholder="+91-...">
    <label>Initial Risk Level</label><select id="f-risk-level">
     <option value="low">Low Risk (8%)</option>
     <option value="moderate">Moderate Risk (50%)</option>
     <option value="high">High Risk (87%)</option>
     <option value="critical">Critical Risk (95%)</option>
    </select>
   <div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end">
    <button class="btn btn-gray" onclick="cancelAdmit()">Cancel</button>
    <button class="btn btn-green" onclick="confirmAdmit()">Admit</button>
   </div>
  </div></div>`:''}
  ${showHitl?`<div class="hitl-modal"><div class="hitl-box">
   <div class="modal-title">Clinician Feedback</div>
   <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:12px">Patient: <b>${hitlPatientName}</b></div>
   <label style="margin-top:8px">Prediction Accuracy</label>
   <select id="f-hitl-accuracy">
    <option value="">Rate the model's prediction...</option>
    <option value="correct">Correct - Model was accurate</option>
    <option value="partial">Partially Correct - Missed some details</option>
    <option value="incorrect">Incorrect - Model was wrong</option>
   </select>
   <label style="margin-top:10px">Clinical Notes</label>
   <textarea id="f-hitl-notes" placeholder="Add your clinical observations..." style="width:100%;padding:8px;border:0.5px solid var(--color-border-secondary);border-radius:6px;font-family:inherit;font-size:13px;min-height:80px;background:var(--color-background-secondary)"></textarea>
   <label style="margin-top:10px">Recommended Action</label>
   <select id="f-hitl-action">
    <option value="">Select action...</option>
    <option value="monitor">Continue monitoring</option>
    <option value="escalate">Escalate care</option>
    <option value="investigate">Further investigation needed</option>
    <option value="discharge">Ready for discharge</option>
   </select>
   <div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end">
    <button class="btn btn-gray" onclick="closeHitlFeedback()">Cancel</button>
    <button class="btn btn-blue" onclick="submitHitlFeedback(${hitlPatientId})">Submit Feedback</button>
   </div>
  </div></div>`:''}

  <div class="hdr">
   <div class="hdr-left">
    <h2>${p.name}</h2>
    <p>${p.gender}, ${p.age}y &bull; ${p.ward} &bull; Admitted: ${p.admitted} &bull; ICU-LOS: ${p.ICULOS}h &bull; Doctor: ${p.doctor}</p>
   </div>
   <div class="action-btns">
    <button class="btn btn-blue" onclick="sendManualAlert(${p.id})">Send Alert</button>
    <button class="btn btn-blue" onclick="openHitlFeedback(${p.id}, '${p.name}')">Clinician Feedback</button>
    <button class="btn btn-green" onclick="downloadPatientReport(${p.id})">Download Report</button>
    <button class="btn btn-green" onclick="downloadMedicalCert(${p.id})">Medical Certificate</button>
    <button class="btn btn-red" onclick="startDischarge()">Discharge</button>
   </div>
  </div>

  <div class="metrics">
   <div class="metric-card">
    <div class="metric-label">Heart Rate</div>
    <div class="metric-val ${vClass('HR',p.vitals.HR)}">${p.vitals.HR} <span style="font-size:12px;font-weight:400">bpm</span></div>
    <div class="metric-sub">Normal: 60–100</div>
   </div>
   <div class="metric-card">
    <div class="metric-label">Temperature</div>
    <div class="metric-val ${vClass('Temp',p.vitals.Temp)}">${p.vitals.Temp}°C</div>
    <div class="metric-sub">Normal: 36.1–37.5</div>
   </div>
   <div class="metric-card">
    <div class="metric-label">MAP</div>
    <div class="metric-val ${vClass('MAP',p.vitals.MAP)}">${p.vitals.MAP} <span style="font-size:12px;font-weight:400">mmHg</span></div>
    <div class="metric-sub">Normal: ≥65</div>
   </div>
   <div class="metric-card">
    <div class="metric-label">O₂ Saturation</div>
    <div class="metric-val ${vClass('O2Sat',p.vitals.O2Sat)}">${p.vitals.O2Sat}%</div>
    <div class="metric-sub">Normal: ≥95%</div>
   </div>
  </div>

  <div class="row2">
   <div>
    <div class="card" style="margin-bottom:12px">
     <div class="card-title">Sepsis Risk Score</div>
     <div class="risk-meter">
      <div class="risk-bar-wrap"><div class="risk-bar" style="width:${rPct}%;background:${rCol}"></div></div>
      <div class="risk-pct ${rTc}">${rPct}%</div>
     </div>
     <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:10px">Risk Level: <b style="color:${rCol}">${riskLabel(p.sepsisRisk)}</b></div>
     <div class="card-title" style="margin-top:4px">Sepsis Risk Trend (8h)</div>
     <div class="chart-wrap" style="height:140px"><canvas id="risk-trend-chart" role="img" aria-label="Sepsis risk trend over 8 hours for ${p.name}">Sepsis risk trend for ${p.name}</canvas></div>
    </div>
    <div class="card">
     <div class="card-title">Active Alerts</div>
     ${alertsHTML}
     <div class="card-title" style="margin-top:12px">SMS Alert Log</div>
     <div class="sms-log">${smsHTML}</div>
    </div>
   </div>

   <div>
    <div class="card" style="margin-bottom:12px">
     <div class="card-title">Explainable AI — Top Contributing Features</div>
     <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:10px">Features driving the sepsis prediction for this patient:</div>
     ${featHTML}
    </div>
    <div class="card">
     <div class="card-title">Current Vitals &amp; Labs</div>
     <div class="vitals-grid">
      <div class="vital-item"><div class="vital-lbl">Resp Rate</div><div class="vital-num ${vClass('Resp',p.vitals.Resp)}">${p.vitals.Resp} /min</div></div>
      <div class="vital-item"><div class="vital-lbl">SBP/DBP</div><div class="vital-num">${p.vitals.SBP}/${p.vitals.DBP}</div></div>
      <div class="vital-item"><div class="vital-lbl">WBC</div><div class="vital-num ${vClass('WBC',p.labs.WBC)}">${p.labs.WBC} k/μL</div></div>
      <div class="vital-item"><div class="vital-lbl">Lactate</div><div class="vital-num ${p.labs.Lactate>2?'abn':''}">${p.labs.Lactate} mmol/L</div></div>
      <div class="vital-item"><div class="vital-lbl">Creatinine</div><div class="vital-num ${p.labs.Creatinine>1.2?'warn':''}">${p.labs.Creatinine} mg/dL</div></div>
      <div class="vital-item"><div class="vital-lbl">Platelets</div><div class="vital-num ${p.labs.Platelets<150?'warn':''}">${p.labs.Platelets} k/μL</div></div>
      <div class="vital-item"><div class="vital-lbl">pH</div><div class="vital-num ${p.labs.pH<7.35?'abn':''}">${p.labs.pH}</div></div>
      <div class="vital-item"><div class="vital-lbl">HCO₃</div><div class="vital-num ${p.labs.HCO3<22?'warn':''}">${p.labs.HCO3} mEq/L</div></div>
      <div class="vital-item"><div class="vital-lbl">Glucose</div><div class="vital-num">${p.labs.Glucose} mg/dL</div></div>
      <div class="vital-item"><div class="vital-lbl">FiO₂</div><div class="vital-num">${p.labs.FiO2}</div></div>
      <div class="vital-item"><div class="vital-lbl">BUN</div><div class="vital-num">${p.labs.BUN} mg/dL</div></div>
      <div class="vital-item"><div class="vital-lbl">Sodium</div><div class="vital-num">${p.labs.Sodium} mEq/L</div></div>
     </div>
    </div>
   </div>
  </div>

  <div class="row3">
   <div class="card">
    <div class="card-title">Vital Trend (8h)</div>
    <div class="tabs">${tabsHTML}</div>
    <div class="chart-wrap"><canvas id="trend-chart" role="img" aria-label="${chartTab} trend for ${p.name}">${chartTab} trend data for ${p.name}</canvas></div>
   </div>
   <div class="card">
    <div class="card-title">Lab Summary</div>
    <table style="width:100%;font-size:12px;border-collapse:collapse">
     <tr style="color:var(--color-text-secondary);font-size:11px"><td style="padding:4px 0">Parameter</td><td style="text-align:right">Value</td><td style="text-align:right">Status</td></tr>
     ${[
      ['WBC',p.labs.WBC,'k/μL',p.labs.WBC>11?'Elevated':'Normal'],
      ['Lactate',p.labs.Lactate,'mmol/L',p.labs.Lactate>2?'High':'Normal'],
      ['Creatinine',p.labs.Creatinine,'mg/dL',p.labs.Creatinine>1.2?'Elevated':'Normal'],
      ['Platelets',p.labs.Platelets,'k/μL',p.labs.Platelets<150?'Low':'Normal'],
      ['Bilirubin',p.labs.Bilirubin,'mg/dL',p.labs.Bilirubin>1.2?'High':'Normal'],
      ['pH',p.labs.pH,'',p.labs.pH<7.35?'Acidosis':p.labs.pH>7.45?'Alkalosis':'Normal'],
      ['Potassium',p.labs.Potassium,'mEq/L',p.labs.Potassium<3.5?'Low':'Normal'],
      ['HCO₃',p.labs.HCO3,'mEq/L',p.labs.HCO3<22?'Low':'Normal'],
     ].map(([n,v,u,s])=>`<tr style="border-top:0.5px solid var(--color-border-tertiary)">
      <td style="padding:5px 0;color:var(--color-text-secondary)">${n}</td>
      <td style="text-align:right;padding:5px 0;font-weight:500">${v} <span style="font-size:10px;color:var(--color-text-tertiary)">${u}</span></td>
      <td style="text-align:right;padding:5px 0"><span class="badge ${s==='Normal'?'badge-ok':s==='Low'?'badge-info':'badge-danger'}">${s}</span></td>
     </tr>`).join('')}
    </table>
   </div>
  </div>
  </div>
 `;
 setTimeout(()=>initCharts(p),50);
}

function selectPt(id){
 selectedId=id;
 chartTab='HR';
 stopRealTimeUpdates();  // Stop previous updates
 startRealTimeUpdates(); // Start for new patient
 renderAll();
}
function setChartTab(tab,pid){
 chartTab=tab;
 const p=patients.find(x=>x.id===pid);
 if(!p) return;
 destroyCharts();
 setTimeout(()=>initCharts(p),30);
 document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active',el.textContent===tab));
}
function startDischarge(){showDischarge=true;renderMain();}
function cancelDischarge(){showDischarge=false;renderMain();}
function confirmDischarge(id){
 const p=patients.find(x=>x.id===id);
 if(p) p.status='discharged';
 showDischarge=false;
 const remaining=patients.filter(x=>x.status==='admitted');
 selectedId=remaining.length?remaining[0].id:-1;
 renderAll();
}
function cancelAdmit(){showAdmit=false;renderMain();}
function confirmAdmit(){
 const name=document.getElementById('f-name')?.value||'New Patient';
 const age=parseInt(document.getElementById('f-age')?.value)||50;
 const gender=document.getElementById('f-gender')?.value||'M';
 const ward=document.getElementById('f-ward')?.value||'ICU';
 const doc=document.getElementById('f-doc')?.value||'Dr. Unknown';
 const phone=document.getElementById('f-phone')?.value||'+91-00000-00000';

 // Send to backend API
 fetch('/api/patient/admit', {
  method: 'POST',
  headers: {'Content-Type': 'application/json'},
  body: JSON.stringify({name, age, gender, ward, doctor: doc, doctorPhone: phone})
 })
 .then(r => r.json())
 .then(patient => {
  patients.push(patient);
  selectedId=patient.id;
  showAdmit=false;
  renderAll();
  startRealTimeUpdates();
 })
 .catch(e => {
  console.error('Admit failed:', e);
  alert('Error admitting patient. Check console.');
 });
}
function sendManualAlert(id){
 const p=patients.find(x=>x.id===id);
 if(!p) return;
 sendSMS(p);
 alertsSent[p.id]=true;
 renderMain();
}

function openHitlFeedback(patientId, patientName){
 hitlPatientId=patientId;
 hitlPatientName=patientName;
 showHitl=true;
 renderMain();
}

function closeHitlFeedback(){
 showHitl=false;
 hitlPatientId=null;
 hitlPatientName='';
 renderMain();
}

function submitHitlFeedback(patientId){
 const accuracy=document.getElementById('f-hitl-accuracy')?.value;
 const notes=document.getElementById('f-hitl-notes')?.value;
 const action=document.getElementById('f-hitl-action')?.value;
 
 if(!accuracy || !notes || !action){
  alert('Please fill in all fields');
  return;
 }
 
 const user=JSON.parse(localStorage.getItem('user')||'{}');
 const clinicianId=user.id||'unknown';
 
 fetch('/api/hitl/submit', {
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({
   patient_id:patientId,
   clinician_id:clinicianId,
   accuracy:accuracy,
   clinical_notes:notes,
   recommended_action:action,
   timestamp:new Date().toISOString()
  })
 })
 .then(r=>r.json())
 .then(data=>{
  if(data.success){
   alert('Feedback submitted successfully');
   closeHitlFeedback();
   renderMain();
  } else {
   alert('Error submitting feedback');
  }
 })
 .catch(e=>{
  console.error('HITL submission error:',e);
  alert('Error submitting feedback. Check console.');
 });
}

document.getElementById('admitBtn').addEventListener('click',()=>{showAdmit=true;renderMain();});

function goToFeedbackHistory(){
 window.location.href='/hitl-feedback';
}

function logout(){
 window.location.href='/logout';
}

function downloadPatientReport(patientId){
 window.location.href=`/patient/report/${patientId}`;
}

function downloadMedicalCert(patientId){
 window.location.href=`/patient/certificate/${patientId}`;
}

function renderAll(){
 renderSidebar();
 renderMain();
}

autoAlert();
renderAll();
if(selectedId!==-1){
 startRealTimeUpdates();
}
    </script>
</body>
</html>
